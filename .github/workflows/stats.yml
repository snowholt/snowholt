name: Generate Secure Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically every 24 hours
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Stats Card securely
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          # This perfectly matches your rose_pine theme and counts all private work!
          options: 'username=snowholt&show_icons=true&theme=rose_pine&include_all_commits=true&count_private=true&hide_border=true'
          path: github-stats.svg
          token: ${{ secrets.MY_STATS_TOKEN }}

      - name: Push image to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg
          git commit -m "Update private stats" || exit 0
          git push
